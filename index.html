<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAK | Midnight Pro</title>
  <style>
    :root {
      --bg-deep: #02040a;
      --panel-bg: rgba(13, 17, 23, 0.8);
      --neon-blue: #0088ff;
      --electric-cyan: #00f2ff;
      --text-main: #e6edf3;
      --text-dim: #8b949e;
      --up-green: #00ffa3;
      --down-red: #ff3366;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Glassmorphism Header */
    nav {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .logo {
      font-weight: 800;
      font-size: 1.4rem;
      background: linear-gradient(90deg, var(--neon-blue), var(--electric-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .search-group {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 4px;
    }

    input {
      background: transparent;
      border: none;
      color: white;
      padding: 8px 12px;
      outline: none;
      width: 180px;
    }

    button {
      background: var(--neon-blue);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background: var(--electric-cyan); color: black; }

    main {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      padding: 20px;
      flex-grow: 1;
      overflow: hidden;
    }

    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .price-hero {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      margin: 10px 0;
      text-shadow: 0 0 30px rgba(0, 136, 255, 0.3);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 25px 0;
    }

    .metric-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      padding: 15px;
      border-radius: 12px;
    }

    .metric-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
    .metric-value { font-size: 1.1rem; font-weight: 600; margin-top: 5px; }

    #chartContainer {
      flex-grow: 1;
      margin-top: 20px;
      min-height: 300px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      position: relative;
    }

    canvas { width: 100%; height: 100%; }

    /* News Feed Styling */
    .news-scroll { overflow-y: auto; flex-grow: 1; }
    .news-card {
      padding: 16px 0;
      border-bottom: 1px solid var(--glass-border);
    }
    .news-card:last-child { border: none; }
    .source-tag {
      color: var(--electric-cyan);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .headline { font-size: 1rem; font-weight: 500; margin-top: 6px; line-height: 1.4; }

  </style>
</head>
<body>

  <nav>
    <div class="logo">STAK PRO</div>
    <div class="search-group">
      <input type="text" id="tickerInput" placeholder="Enter Symbol..." value="BTC">
      <button onclick="loadTicker()">ANALYZE</button>
    </div>
  </nav>

  <main>
    <section class="glass-panel">
      <div id="nameDisplay" style="color: var(--text-dim); font-weight: 600;">MARKET OVERVIEW</div>
      <div id="priceDisplay" class="price-hero">$0.00</div>
      <div id="changeDisplay" style="font-size: 1.2rem; font-weight: 700;">0.00%</div>

      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Exchange</div>
          <div id="exchangeDisplay" class="metric-value">---</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Market Cap</div>
          <div id="mktCap" class="metric-value">---</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Status</div>
          <div id="providerStatus" class="metric-value" style="color: var(--electric-cyan);">IDLE</div>
        </div>
      </div>

      <div id="chartContainer">
        <canvas id="marketChart"></canvas>
      </div>
    </section>

    <aside class="glass-panel">
      <h3 style="margin-top: 0; color: var(--text-dim);">TERMINAL FEED</h3>
      <div id="newsList" class="news-scroll">
        </div>
    </aside>
  </main>

  <script>
    async function loadTicker() {
      const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
      if (!ticker) return;

      document.getElementById('providerStatus').textContent = 'SYNCING';

      try {
        const res = await fetch(`/api/stak?ticker=${ticker}`);
        const data = await res.json();
        renderDashboard(ticker, data);
      } catch (err) {
        document.getElementById('providerStatus').textContent = 'OFFLINE';
      }
    }

    function renderDashboard(symbol, data) {
      document.getElementById('nameDisplay').textContent = data.profile.name;
      document.getElementById('priceDisplay').textContent = `$${data.quote.c.toLocaleString()}`;
      
      const pct = data.quote.dp;
      const changeEl = document.getElementById('changeDisplay');
      changeEl.textContent = `${pct >= 0 ? '▲' : '▼'} ${Math.abs(pct).toFixed(2)}%`;
      changeEl.style.color = pct >= 0 ? 'var(--up-green)' : 'var(--down-red)';

      document.getElementById('exchangeDisplay').textContent = data.profile.exchange;
      document.getElementById('mktCap').textContent = `$${(data.profile.marketCap / 1e9).toFixed(2)}B`;

      drawMidnightChart(data.chart.map(c => c.close));

      document.getElementById('newsList').innerHTML = data.news.map(n => `
        <div class="news-card">
          <div class="source-tag">${n.source}</div>
          <div class="headline">${n.headline}</div>
        </div>
      `).join('');

      document.getElementById('providerStatus').textContent = 'LIVE';
    }

    function drawMidnightChart(points) {
      const canvas = document.getElementById('marketChart');
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Neon Gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, 'rgba(0, 136, 255, 0.5)');
      gradient.addColorStop(1, 'rgba(0, 242, 255, 0)');

      ctx.beginPath();
      ctx.strokeStyle = '#00f2ff';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#0088ff';

      const max = Math.max(...points);
      const min = Math.min(...points);
      const range = max - min;

      points.forEach((p, i) => {
        const x = (i / (points.length - 1)) * canvas.width;
        const y = canvas.height - ((p - min) / range) * canvas.height;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });

      ctx.stroke();
    }

    window.onload = loadTicker;
  </script>
</body>
</html>
