<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAK | Professional Market Terminal</title>
  <style>
    /* STAK PRO TERMINAL - ELECTRIC BLUE THEME
       VERSION: 2.2.0 
    */
    :root {
      --bg-dark: #05070a;
      --panel-bg: rgba(13, 17, 23, 0.7);
      --accent-blue: #3b82f6;
      --electric-cyan: #00f2ff;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --border-color: rgba(56, 139, 253, 0.15);
      --up-green: #23d33a;
      --down-red: #f85149;
      --meter-bg: #161b22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% -20%, #111827, var(--bg-dark));
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- TOP NAVIGATION --- */
    nav {
      height: 64px;
      padding: 0 24px;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--electric-cyan));
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-container input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      color: white;
      padding: 10px 20px;
      width: 320px;
      font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-container input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      width: 380px;
    }

    /* --- DASHBOARD GRID --- */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1px;
      background: var(--border-color);
      overflow: hidden;
    }

    .viewport {
      background: var(--bg-dark);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar {
      background: var(--bg-dark);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    /* --- COMPONENTS --- */
    .hero-stat {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .ticker-info h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .ticker-info p {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .price-display {
      text-align: right;
    }

    .current-price {
      font-size: 3.5rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .price-change {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 8px;
    }

    /* --- METRICS GRID --- */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
    }

    .card-label {
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.25rem;
      font-weight: 700;
    }

    /* --- POSITIONING METER --- */
    .meter-container {
      margin-top: 12px;
      height: 8px;
      background: var(--meter-bg);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .meter-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--down-red), #eab308, var(--up-green));
      transition: width 1s ease-in-out;
    }

    /* --- CHART AREA --- */
    .chart-box {
      background: #000;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      height: 400px;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }

    canvas { width: 100%; height: 100%; display: block; }

    #chartOverlay {
      position: absolute;
      background: var(--accent-blue);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 800;
      pointer-events: none;
      display: none;
      z-index: 10;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    /* Loading UI */
    #chartLoader {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: none; justify-content: center;
      align-items: center; z-index: 5; flex-direction: column; gap: 10px;
    }
    .pulse {
      width: 40px; height: 40px; background: var(--accent-blue);
      border-radius: 50%; animation: pulse-blue 1.5s infinite ease-in-out;
    }
    @keyframes pulse-blue {
      0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
      100% { transform: scale(0.8); opacity: 0.5; }
    }

    /* --- NEWS ITEMS --- */
    .news-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .news-item:last-child { border: none; }

    .news-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--accent-blue);
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .news-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text-primary);
    }
    
    #ratingLabel {
      font-size: 0.8rem;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">
      <div class="logo-icon"></div>
      <div class="logo-text">STAK ANALYZER</div>
    </div>
    <div class="search-container">
      <input type="text" id="tickerInput" placeholder="Enter Ticker or Asset Name..." spellcheck="false">
    </div>
    <div style="font-size: 0.8rem; font-weight: 600; color: var(--accent-blue);">SYSTEM: ONLINE</div>
  </nav>

  <main>
    <div class="viewport">
      <div class="hero-stat">
        <div class="ticker-info">
          <h1 id="tickerEcho">STAK</h1>
          <p id="nameDisplay">PRO TERMINAL READY</p>
        </div>
        <div class="price-display">
          <div id="priceDisplay" class="current-price">$0.00</div>
          <div id="changeDisplay" class="price-change">0.00%</div>
        </div>
      </div>

      <div class="metrics-grid">
        <div class="card">
          <div class="card-label">Market Capitalization</div>
          <div id="mktCap" class="card-value">---</div>
        </div>
        <div class="card">
          <div class="card-label">Exchange / Market</div>
          <div id="exchangeDisplay" class="card-value">---</div>
        </div>
        <div class="card">
          <div class="card-label">Intelligence Score</div>
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
             <div id="sentimentValue" class="card-value">Neutral</div>
             <div id="ratingLabel" style="background: var(--meter-bg); color: var(--text-secondary);">WAITING</div>
          </div>
          <div class="meter-container">
            <div id="sentimentMeter" class="meter-bar" style="width: 50%;"></div>
          </div>
        </div>
      </div>

      <div class="chart-box" id="chartBox">
        <div id="chartLoader"><div class="pulse"></div><div style="font-size: 0.7rem; color: var(--accent-blue); font-weight: 800; margin-top:10px;">SYNCING MARKET DATA...</div></div>
        <div id="chartOverlay"></div>
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <div class="sidebar">
      <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <div class="card-label">Intelligence Feed</div>
        <div id="newsList" style="flex: 1; overflow-y: auto;">
          <p style="color: var(--text-secondary); font-size: 0.9rem;">Waiting for terminal input...</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    let activeChartData = [];
    const input = document.getElementById('tickerInput');
    const chartBox = document.getElementById('chartBox');
    const overlay = document.getElementById('chartOverlay');
    const loader = document.getElementById('chartLoader');
    
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadData(input.value.toUpperCase().trim());
    });

    async function loadData(ticker) {
      if (!ticker) return;
      loader.style.display = 'flex'; // Show loader on start
      
      try {
        const response = await fetch(`/api/stak?ticker=${ticker}`);
        const data = await response.json();
        
        document.getElementById('tickerEcho').textContent = ticker;
        document.getElementById('nameDisplay').textContent = data.profile.name;
        document.getElementById('priceDisplay').textContent = `$${data.quote.c.toLocaleString()}`;
        
        const pct = data.quote.dp;
        const changeEl = document.getElementById('changeDisplay');
        changeEl.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
        changeEl.style.color = pct >= 0 ? 'var(--up-green)' : 'var(--down-red)';

        document.getElementById('mktCap').textContent = `$${(data.profile.marketCap / 1e9).toFixed(2)}B`;
        document.getElementById('exchangeDisplay').textContent = data.profile.exchange;

        let score = 50 + (pct * 8); 
        score = Math.max(5, Math.min(95, score));
        const meter = document.getElementById('sentimentMeter');
        const valText = document.getElementById('sentimentValue');
        const label = document.getElementById('ratingLabel');
        meter.style.width = `${score}%`;

        if (score >= 65) {
          valText.textContent = "Bullish Outlook";
          label.textContent = "BUY";
          label.style.background = "var(--up-green)";
          label.style.color = "#000";
        } else if (score > 35) {
          valText.textContent = "Neutral";
          label.textContent = "HOLD";
          label.style.background = "var(--accent-blue)";
          label.style.color = "#fff";
        } else {
          valText.textContent = "Bearish Signal";
          label.textContent = "SELL";
          label.style.background = "var(--down-red)";
          label.style.color = "#fff";
        }

        document.getElementById('newsList').innerHTML = data.news.map(n => `
          <div class="news-item">
            <div class="news-meta"><span>${n.source}</span><span>${new Date(n.datetime * 1000).toLocaleTimeString()}</span></div>
            <div class="news-title">${n.headline}</div>
          </div>
        `).join('');

        // Charting with delay fix
        if (data.chart && data.chart.length > 0) {
          activeChartData = data.chart.map(c => c.close);
          setTimeout(() => {
            loader.style.display = 'none';
            drawProChart(activeChartData);
          }, 400);
        } else {
          loader.style.display = 'none';
        }

      } catch (err) {
        console.error("Terminal Failure:", err);
        loader.style.display = 'none';
      }
    }

    function drawProChart(points, mouseX = null) {
      const canvas = document.getElementById('mainChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.scale(dpr, dpr);

      ctx.clearRect(0, 0, w, h);
      if (points.length < 2) return;

      const max = Math.max(...points);
      const min = Math.min(...points);
      const range = max - min || 1;
      const padding = 30;

      const getX = (i) => (i / (points.length - 1)) * w;
      const getY = (p) => (h - padding) - ((p - min) / range) * (h - padding * 2);

      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      points.forEach((p, i) => { if (i === 0) ctx.moveTo(getX(i), h); ctx.lineTo(getX(i), getY(p)); });
      ctx.lineTo(w, h); ctx.fillStyle = grad; ctx.fill();

      ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(59, 130, 246, 0.5)';
      ctx.beginPath(); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
      points.forEach((p, i) => { if (i === 0) ctx.moveTo(getX(i), getY(p)); else ctx.lineTo(getX(i), getY(p)); });
      ctx.stroke(); ctx.shadowBlur = 0;

      if (mouseX !== null) {
        const index = Math.round((mouseX / w) * (points.length - 1));
        const p = points[index];
        const x = getX(index), y = getY(p);
        ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
        overlay.style.display = 'block'; overlay.style.left = `${x + 10}px`; overlay.style.top = `${y - 35}px`;
        overlay.textContent = `$${p.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
      } else { overlay.style.display = 'none'; }
    }

    chartBox.addEventListener('mousemove', (e) => {
      if (!activeChartData.length) return;
      const rect = chartBox.getBoundingClientRect();
      drawProChart(activeChartData, e.clientX - rect.left);
    });
    chartBox.addEventListener('mouseleave', () => { if (activeChartData.length) drawProChart(activeChartData); });
    window.addEventListener('resize', () => { if (activeChartData.length) drawProChart(activeChartData); });
  </script>
</body>
</html>
