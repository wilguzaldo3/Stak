<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAK | Market Analyzer</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  
  <style>
    :root {
      --bg-black: #000000;
      --border-white: #ffffff;
      --text-high: #ffffff;
      --text-low: #888888;
      --accent-red: #ff3b30;
      --up-green: #26a69a;
    }

    body {
      background-color: var(--bg-black);
      color: var(--text-high);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    /* The UI Boxes */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
    }

    .box {
      border: 3px solid var(--border-white); /* High contrast border */
      padding: 20px;
      background: #050505;
    }

    /* The Chart Box needs a fixed height */
    #chartContainer {
      width: 100%;
      height: 450px;
      margin-top: 15px;
    }

    input {
      background: #000;
      border: 2px solid #fff;
      color: #fff;
      padding: 10px;
      font-size: 1.2rem;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background: #fff;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .price-large { font-size: 3rem; font-weight: 800; margin: 10px 0; }
    .status-red { color: var(--accent-red); font-weight: bold; }
    
    .news-item { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .news-link { color: #00ffcc; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <div style="margin-bottom: 30px;">
      <input type="text" id="tickerInput" placeholder="ENTER TICKER (e.g. BTC or TSLA)">
      <button onclick="loadTicker()">ANALYZE</button>
      <span id="providerStatus" style="margin-left: 15px; font-size: 0.8rem; color: #555;">Ready</span>
    </div>

    <div class="dashboard-grid">
      <div class="left-col">
        <div class="box">
          <div id="nameDisplay" style="font-size: 1.5rem; color: var(--text-low);">Select Asset</div>
          <div id="priceDisplay" class="price-large">$0.00</div>
          <div id="changeDisplay" class="status-red">0.00%</div>
          
          <div id="chartContainer"></div>
        </div>
      </div>

      <div class="right-col">
        <div class="box">
          <h3>LATEST NEWS</h3>
          <div id="newsList">Enter a ticker to see news...</div>
        </div>
      </div>
    </div>
  </div>

    let candleSeries = null;

      if (!symbol) return;
