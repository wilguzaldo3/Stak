<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAK | Market Terminal</title>
  <style>
    :root {
      --bg-black: #000000;
      --border-white: #ffffff;
      --text-high: #ffffff;
      --text-low: #888888;
      --accent-red: #ff3b30;
      --up-green: #34c759;
    }

    body {
      background-color: var(--bg-black);
      color: var(--text-high);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top Navigation */
    nav {
      border-bottom: 2px solid var(--border-white);
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }

    .search-box {
      display: flex;
      gap: 10px;
    }

    input {
      background: transparent;
      border: 1px solid var(--border-white);
      color: white;
      padding: 8px 12px;
      font-family: inherit;
    }

    button {
      background: var(--border-white);
      color: black;
      border: none;
      padding: 8px 20px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Main Dashboard Layout */
    main {
      display: grid;
      grid-template-columns: 1fr 350px;
      flex-grow: 1;
      overflow: hidden;
    }

    .chart-section {
      border-right: 2px solid var(--border-white);
      padding: 25px;
      display: flex;
      flex-direction: column;
    }

    .ticker-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 30px;
    }

    .price-large { font-size: 4rem; font-weight: 800; line-height: 1; }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-box {
      border: 1px solid var(--border-white);
      padding: 15px;
    }

    .stat-label { font-size: 0.7rem; color: var(--text-low); text-transform: uppercase; margin-bottom: 5px; }
    .stat-value { font-size: 1.2rem; font-weight: bold; }

    /* Canvas Chart Area */
    #chartContainer {
      flex-grow: 1;
      border: 1px solid var(--border-white);
      position: relative;
      margin-bottom: 20px;
    }

    canvas { width: 100%; height: 100%; }

    /* Sidebar / News */
    .sidebar {
      padding: 25px;
      overflow-y: auto;
    }

    .news-item {
      border-bottom: 1px solid #333;
      padding: 15px 0;
    }

    .news-tag {
      font-size: 0.6rem;
      border: 1px solid var(--border-white);
      padding: 2px 5px;
      margin-bottom: 8px;
      display: inline-block;
    }

    .news-headline { font-weight: bold; line-height: 1.4; }

    .provider-tag {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 0.7rem;
      color: var(--text-low);
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">STAK_ANALYZER</div>
    <div class="search-box">
      <input type="text" id="tickerInput" placeholder="SYMBOL" value="AAPL">
      <button onclick="loadTicker()">LOAD</button>
    </div>
  </nav>

  <main>
    <section class="chart-section">
      <div class="ticker-header">
        <div>
          <div id="nameDisplay" style="color: var(--text-low); margin-bottom: 5px;">COMPANY NAME</div>
          <div id="tickerEcho" style="font-weight: bold; font-size: 1.2rem;">SYMBOL</div>
        </div>
        <div style="text-align: right;">
          <div id="priceDisplay" class="price-large">$0.00</div>
          <div id="changeDisplay" style="font-weight: bold;">0.00%</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Exchange</div>
          <div id="exchangeDisplay" class="stat-value">---</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Market Cap</div>
          <div id="mktCap" class="stat-value">---</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Updated</div>
          <div id="updatedAt" class="stat-value">---</div>
        </div>
      </div>

      <div id="chartContainer">
        <canvas id="marketChart"></canvas>
      </div>
    </section>

    <aside class="sidebar">
      <h3 style="margin-top: 0;">MARKET_NEWS</h3>
      <div id="newsList">
        </div>
    </aside>
  </main>

  <div class="provider-tag">PROVIDER_STATUS: <span id="providerStatus">IDLE</span></div>

  <script>
    async function loadTicker() {
      const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
      if (!ticker) return;

      document.getElementById('providerStatus').textContent = 'FETCHING...';

      try {
        const res = await fetch(`/api/stak?ticker=${ticker}`);
        const data = await res.json();
        renderData(ticker, data);
      } catch (err) {
        document.getElementById('providerStatus').textContent = 'ERROR';
        console.error(err);
      }
    }

    function renderData(symbol, data) {
      document.getElementById('nameDisplay').textContent = data.profile.name;
      document.getElementById('tickerEcho').textContent = symbol;
      document.getElementById('exchangeDisplay').textContent = data.profile.exchange;
      document.getElementById('priceDisplay').textContent = `$${data.quote.c.toFixed(2)}`;
      document.getElementById('mktCap').textContent = `$${(data.profile.marketCap / 1e9).toFixed(2)}B`;
      document.getElementById('updatedAt').textContent = new Date().toLocaleTimeString();

      // Percent Change Logic
      const pct = data.quote.dp;
      const changeEl = document.getElementById('changeDisplay');
      changeEl.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
      changeEl.style.color = pct >= 0 ? 'var(--up-green)' : 'var(--accent-red)';

      // Draw Simple Line Chart
      drawChart(data.chart.map(c => c.close));

      // Populate News
      document.getElementById('newsList').innerHTML = data.news.map(n => `
        <div class="news-item">
          <span class="news-tag">${n.source}</span>
          <div class="news-headline">${n.headline}</div>
        </div>
      `).join('');

      document.getElementById('providerStatus').textContent = 'LIVE';
    }

    function drawChart(points) {
      const canvas = document.getElementById('marketChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      
      canvas.width = canvas.offsetWidth * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      ctx.scale(dpr, dpr);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();

      const max = Math.max(...points);
      const min = Math.min(...points);
      const range = max - min;
      const width = canvas.offsetWidth;
      const height = canvas.offsetHeight;

      points.forEach((p, i) => {
        const x = (i / (points.length - 1)) * width;
        const y = height - ((p - min) / range) * height;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });

      ctx.stroke();
    }

    // Load initial ticker
    window.onload = loadTicker;
  </script>
</body>
</html>
