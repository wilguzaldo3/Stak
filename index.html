<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAK | Professional Market Terminal</title>
  <style>
    /* STAK PRO TERMINAL - ELECTRIC BLUE THEME
       VERSION: 2.2.0 
    */
    :root {
      --bg-dark: #05070a;
      --panel-bg: rgba(13, 17, 23, 0.7);
      --accent-blue: #3b82f6;
      --electric-cyan: #00f2ff;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --border-color: rgba(56, 139, 253, 0.15);
      --up-green: #23d33a;
      --down-red: #f85149;
      --meter-bg: #161b22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% -20%, #111827, var(--bg-dark));
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- TOP NAVIGATION --- */
    nav {
      height: 64px;
      padding: 0 24px;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--electric-cyan));
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-container input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      color: white;
      padding: 10px 20px;
      width: 320px;
      font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-container input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      width: 380px;
    }

    /* --- DASHBOARD GRID --- */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1px;
      background: var(--border-color);
      overflow: hidden;
    }

    .viewport {
      background: var(--bg-dark);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar {
      background: var(--bg-dark);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    /* --- COMPONENTS --- */
    .hero-stat {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .ticker-info h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .ticker-info p {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .price-display {
      text-align: right;
    }

    .current-price {
      font-size: 3.5rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .price-change {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 8px;
    }

    /* --- METRICS GRID --- */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
    }

    .card-label {
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.25rem;
      font-weight: 700;
    }

    /* --- POSITIONING METER --- */
    .meter-container {
      margin-top: 12px;
      height: 8px;
      background: var(--meter-bg);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .meter-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--down-red), #eab308, var(--up-green));
      transition: width 1s ease-in-out;
    }

    .meter-marker {
      position: absolute;
      top: -4px;
      width: 4px;
      height: 16px;
      background: white;
      box-shadow: 0 0 10px white;
      transform: translateX(-50%);
    }

    /* --- CHART AREA --- */
    .chart-box {
      background: #000;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      height: 400px;
      position: relative;
      overflow: hidden;
    }

    canvas { width: 100%; height: 100%; }

    /* --- NEWS ITEMS --- */
    .news-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .news-item:last-child { border: none; }

    .news-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--accent-blue);
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .news-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text-primary);
    }
    
    #ratingLabel {
      font-size: 0.8rem;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">
      <div class="logo-icon"></div>
      <div class="logo-text">STAK ANALYZER</div>
    </div>
    <div class="search-container">
      <input type="text" id="tickerInput" placeholder="Enter Ticker or Asset Name..." spellcheck="false">
    </div>
    <div style="font-size: 0.8rem; font-weight: 600; color: var(--accent-blue);">SYSTEM: ONLINE</div>
  </nav>

  <main>
    <div class="viewport">
      <div class="hero-stat">
        <div class="ticker-info">
          <h1 id="tickerEcho">STAK</h1>
          <p id="nameDisplay">PRO TERMINAL READY</p>
        </div>
        <div class="price-display">
          <div id="priceDisplay" class="current-price">$0.00</div>
          <div id="changeDisplay" class="price-change">0.00%</div>
        </div>
      </div>

      <div class="metrics-grid">
        <div class="card">
          <div class="card-label">Market Capitalization</div>
          <div id="mktCap" class="card-value">---</div>
        </div>
        <div class="card">
          <div class="card-label">Exchange / Market</div>
          <div id="exchangeDisplay" class="card-value">---</div>
        </div>
        <div class="card">
          <div class="card-label">Intelligence Score</div>
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
             <div id="sentimentValue" class="card-value">Neutral</div>
             <div id="ratingLabel" style="background: var(--meter-bg); color: var(--text-secondary);">WAITING</div>
          </div>
          <div class="meter-container">
            <div id="sentimentMeter" class="meter-bar" style="width: 50%;"></div>
          </div>
        </div>
      </div>

      <div class="chart-box">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <div class="sidebar">
      <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <div class="card-label">Intelligence Feed</div>
        <div id="newsList" style="flex: 1; overflow-y: auto;">
          <p style="color: var(--text-secondary); font-size: 0.9rem;">Waiting for terminal input...</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- APP LOGIC ---
    const input = document.getElementById('tickerInput');
    
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadData(input.value.toUpperCase().trim());
    });

    async function loadData(ticker) {
      if (!ticker) return;
      
      try {
        const response = await fetch(`/api/stak?ticker=${ticker}`);
        const data = await response.json();
        
        // 1. Update Core UI
        document.getElementById('tickerEcho').textContent = ticker;
        document.getElementById('nameDisplay').textContent = data.profile.name;
        document.getElementById('priceDisplay').textContent = `$${data.quote.c.toLocaleString()}`;
        
        const pct = data.quote.dp;
        const changeEl = document.getElementById('changeDisplay');
        changeEl.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
        changeEl.style.color = pct >= 0 ? 'var(--up-green)' : 'var(--down-red)';

        // 2. Metrics
        document.getElementById('mktCap').textContent = `$${(data.profile.marketCap / 1e9).toFixed(2)}B`;
        document.getElementById('exchangeDisplay').textContent = data.profile.exchange;

        // 3. AI Intelligence Logic (Buy / Hold / Sell)
        // Base score starts at 50, adjusts by price performance
        let score = 50 + (pct * 8); 
        score = Math.max(5, Math.min(95, score)); // Clamp between 5 and 95

        const meter = document.getElementById('sentimentMeter');
        const valText = document.getElementById('sentimentValue');
        const label = document.getElementById('ratingLabel');

        meter.style.width = `${score}%`;

        if (score >= 65) {
          valText.textContent = "Bullish Outlook";
          label.textContent = "BUY";
          label.style.background = "var(--up-green)";
          label.style.color = "#000";
        } else if (score > 35 && score < 65) {
          valText.textContent = "Neutral";
          label.textContent = "HOLD";
          label.style.background = "var(--accent-blue)";
          label.style.color = "#fff";
        } else {
          valText.textContent = "Bearish Signal";
          label.textContent = "SELL";
          label.style.background = "var(--down-red)";
          label.style.color = "#fff";
        }

        // 4. News Feed
        document.getElementById('newsList').innerHTML = data.news.map(n => `
          <div class="news-item">
            <div class="news-meta">
              <span>${n.source}</span>
              <span>${new Date(n.datetime * 1000).toLocaleTimeString()}</span>
            </div>
            <div class="news-title">${n.headline}</div>
          </div>
        `).join('');

        // 5. Charting
        drawProChart(data.chart.map(c => c.close));

      } catch (err) {
        console.error("Terminal Failure:", err);
      }
    }

    function drawProChart(points) {
      const canvas = document.getElementById('mainChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      
      canvas.width = canvas.offsetWidth * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      ctx.scale(dpr, dpr);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Glow Effect
      ctx.shadowBlur = 15;
      ctx.shadowColor = 'rgba(59, 130, 246, 0.5)';
      
      ctx.beginPath();
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';

      const max = Math.max(...points);
      const min = Math.min(...points);
      const range = max - min;
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;

      points.forEach((p, i) => {
        const x = (i / (points.length - 1)) * w;
        const y = h - ((p - min) / range) * h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });

      ctx.stroke();
    }
  </script>
</body>
</html>
