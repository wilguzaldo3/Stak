<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAK | Stock Trading Analyzer Knowledge</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg-deep: #06070a;
      --surface: #10141b;
      --surface-2: #171c25;
      --accent: #3b82f6;
      --accent-soft: #60a5fa;
      --glow: rgba(59, 130, 246, 0.28);
      --border: rgba(255, 255, 255, 0.08);
      --text-high: #ffffff;
      --text-low: #8b93a7;
      --up-green: #1ed760;
      --hold-yellow: #f4c542;
      --down-red: #ff4d6d;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    body.light {
      --bg-deep: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef2f9;
      --accent: #2563eb;
      --accent-soft: #3b82f6;
      --glow: rgba(59, 130, 246, 0.18);
      --border: rgba(10, 18, 34, 0.08);
      --text-high: #0b1220;
      --text-low: #667085;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      background: radial-gradient(circle at top, rgba(59, 130, 246, 0.12), transparent 30%), var(--bg-deep);
      color: var(--text-high);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 40px;
      letter-spacing: -0.02em;
      transition: background 0.35s ease, color 0.35s ease;
    }

    .nav-glass {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 18px;
      margin-bottom: 22px;
      position: sticky;
      top: 20px;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .brand { font-weight: 900; font-size: 1.45rem; letter-spacing: -0.04em; }
    .brand span { color: var(--accent-soft); }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 14px;
      width: 460px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--glow); outline: none; }
    .search-box input { background: transparent; border: none; color: var(--text-high); padding: 10px; width: 100%; font-size: 1rem; outline: none; }

    .nav-right { display: flex; align-items: center; gap: 14px; }

    .mode-btn, .primary-btn {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-high);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent-soft), var(--accent));
      color: #fff;
      border: none;
      box-shadow: 0 16px 40px var(--glow);
    }

    .quick-note { max-width: 1400px; margin: 0 auto 20px auto; color: var(--text-low); font-size: 0.9rem; line-height: 1.6; padding: 0 4px; }

    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; max-width: 1400px; margin: 0 auto; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 24px; position: relative; overflow: hidden; box-shadow: var(--shadow); }

    .main-ticker { grid-column: span 8; }
    .sidebar { grid-column: span 4; }
    .full-width { grid-column: span 12; }

    .price-hero {
      font-size: 4.5rem;
      font-weight: 800;
      margin: 15px 0;
      background: linear-gradient(to right, var(--text-high), var(--text-low));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subline { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .badge {
      background: color-mix(in srgb, var(--accent) 16%, transparent);
      color: var(--accent-soft);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      width: fit-content;
    }

    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .metric-card { background: var(--surface-2); padding: 16px; border-radius: 14px; border: 1px solid var(--border); }
    .metric-label { color: var(--text-low); font-size: 0.8rem; margin-bottom: 6px; }
    .metric-val { font-size: 1.1rem; font-weight: 700; }

    .chart-wrap {
      margin-top: 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface-2);
      overflow: hidden; /* Important for TradingView */
      height: 400px;
    }

    .news-item { padding: 15px 0; border-bottom: 1px solid var(--border); transition: transform 0.2s; }
    .news-item:hover { transform: translateX(5px); }
    .news-tag { color: var(--accent-soft); font-size: 0.72rem; font-weight: 800; }

    .action-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    .buy-action { background: linear-gradient(135deg, var(--accent-soft), var(--accent)); color: #fff; box-shadow: 0 16px 40px var(--glow); }

    .section-title { margin-bottom: 20px; font-weight: 800; border-left: 3px solid var(--accent); padding-left: 15px; }

    .recommendation-wrap { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 22px; align-items: center; }

    .signal-scale { position: relative; margin-top: 18px; padding-top: 24px; }
    .signal-bar { height: 16px; border-radius: 999px; background: linear-gradient(90deg, var(--down-red) 0 33.33%, var(--hold-yellow) 33.33% 66.66%, var(--up-green) 66.66% 100%); position: relative; }
    .signal-marker { position: absolute; top: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; transition: left 0.35s ease; }
    .signal-marker .dot { width: 18px; height: 18px; border-radius: 50%; background: var(--surface); border: 4px solid var(--accent-soft); box-shadow: 0 0 0 6px var(--glow); }
    .signal-marker .stem { width: 2px; height: 26px; background: var(--accent-soft); }

    .signal-badges { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.85rem; font-weight: 700; }
    .sell { color: var(--down-red); }
    .hold { color: var(--hold-yellow); }
    .buy { color: var(--up-green); }

    .ai-chip { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; padding: 8px 12px; border-radius: 999px; background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent-soft); font-size: 0.82rem; font-weight: 800; }

    @media (max-width: 1100px) { .main-ticker, .sidebar, .full-width { grid-column: span 12; } }
  </style>
</head>
<body>
  <nav class="nav-glass">
    <div class="brand">ST<span>AK</span></div>
    <div class="search-box">
      <input type="text" id="ticker" placeholder="ENTER SYMBOL (AAPL, BTC, TSLA)..." autocomplete="off" />
      <button id="loadBtn" class="primary-btn">Load</button>
    </div>
    <div class="nav-right">
      <div style="color: var(--text-low); font-size: 0.9rem;">Live AI Terminal</div>
      <button id="modeToggle" class="mode-btn">☾ Night Mode</button>
    </div>
  </nav>

  <div class="grid">
    <div class="panel main-ticker">
      <div class="badge" id="marketBadge">Awaiting Data</div>
      <h1 id="nameDisplay" style="margin: 10px 0 0 0;">SELECT A TICKER</h1>
      <div class="price-hero" id="priceDisplay">$0.00</div>
      <div class="subline">
        <div id="changeDisplay" style="color: var(--up-green); font-weight: 800;">+0.00% (+$0.00) ▲</div>
        <div class="status-chip" id="providerStatus" style="color:var(--text-low)">Ready</div>
      </div>

      <div class="chart-wrap" id="chartContainer"></div>

      <div class="metric-grid">
        <div class="metric-card"><div class="metric-label">MARKET CAP</div><div class="metric-val" id="mktCap">—</div></div>
        <div class="metric-card"><div class="metric-label">OPEN / PREV CLOSE</div><div class="metric-val" id="openPrev">—</div></div>
        <div class="metric-card"><div class="metric-label">DAY RANGE</div><div class="metric-val" id="dayRange">—</div></div>
        <div class="metric-card"><div class="metric-label">AI CONFIDENCE</div><div class="metric-val" id="aiConfidence">—</div></div>
      </div>
    </div>

    <div class="panel sidebar">
      <div id="consensusText" style="font-size: 2.5rem; font-weight: 800; color: var(--accent-soft); margin: 10px 0;">WAITING</div>
      <p id="summaryText" style="color: var(--text-low); font-size: 0.95rem; line-height: 1.7;">Enter a ticker to begin.</p>
      <button class="action-btn buy-action" id="refreshBtn">Refresh Data</button>
      <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;" />
      <div style="display: flex; justify-content: space-between; margin-bottom: 15px;"><span>TICKER</span><span id="tickerEcho">—</span></div>
      <div style="display: flex; justify-content: space-between; margin-bottom: 15px;"><span>EXCHANGE</span><span id="exchangeDisplay">—</span></div>
      <div style="display: flex; justify-content: space-between;"><span>LAST UPDATED</span><span id="updatedAt">—</span></div>
    </div>

    <div class="panel full-width">
      <div class="section-title">LIVE INTELLIGENCE FEED</div>
      <div id="newsList"></div>
    </div>
  </div>

  <script>
    const tickerInput = document.getElementById('ticker');
    const modeToggle = document.getElementById('modeToggle');
    const chartContainer = document.getElementById('chartContainer');

    let isLight = false;
    let chart, candleSeries;

    // 3. INITIALIZE TRADINGVIEW CHART
    function initChart() {
      chart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: 400,
        layout: { 
            background: { color: isLight ? '#ffffff' : '#171c25' }, 
            textColor: isLight ? '#0b1220' : '#d1d4dc' 
        },
        grid: {
            vertLines: { color: isLight ? '#eef2f9' : '#2B2B43' },
            horzLines: { color: isLight ? '#eef2f9' : '#2B2B43' },
        },
        timeScale: { borderColor: isLight ? '#eef2f9' : '#2B2B43' },
      });

      candleSeries = chart.addCandlestickSeries({
        upColor: '#1ed760', 
        downColor: '#ff4d6d', 
        borderVisible: false,
        wickUpColor: '#1ed760', 
        wickDownColor: '#ff4d6d',
      });

      window.addEventListener('resize', () => {
        chart.applyOptions({ width: chartContainer.clientWidth });
      });
    }

    initChart();

    modeToggle.addEventListener('click', () => {
      isLight = !isLight;
      document.body.classList.toggle('light', isLight);
      modeToggle.textContent = isLight ? '☀ Day Mode' : '☾ Night Mode';
      chart.applyOptions({
        layout: { background: { color: isLight ? '#ffffff' : '#171c25' }, textColor: isLight ? '#0b1220' : '#d1d4dc' }
      });
    });

    // 4. LOAD TICKER DATA
    async function loadTicker() {
      const symbol = tickerInput.value.toUpperCase().trim();
      if (!symbol) return;
      
      document.getElementById('providerStatus').textContent = 'Loading...';

      try {
        const res = await fetch(`/api/stak?ticker=${symbol}`);
        const data = await res.json();

        // Update UI
        document.getElementById('nameDisplay').textContent = data.profile.name;
        document.getElementById('priceDisplay').textContent = `$${data.quote.c.toFixed(2)}`;
        document.getElementById('tickerEcho').textContent = symbol;
        document.getElementById('mktCap').textContent = `$${(data.profile.marketCap / 1e9).toFixed(2)}B`;
        document.getElementById('openPrev').textContent = `${data.quote.o} / ${data.quote.pc}`;
        document.getElementById('dayRange').textContent = `${data.quote.l} - ${data.quote.h}`;
        
        // Update Chart with Candlesticks
        candleSeries.setData(data.chart);
        chart.timeScale().fitContent();

        // Update News
        document.getElementById('newsList').innerHTML = data.news.map(item => `
            <div class="news-item">
                <span class="news-tag">${item.source}</span>
                <div style="font-weight:700">${item.headline}</div>
            </div>
        `).join('');

        document.getElementById('providerStatus').textContent = 'Live Data';
      } catch (err) {
        document.getElementById('providerStatus').textContent = 'Error loading';
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadTicker);
    tickerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadTicker(); });
  </script>
</body>
</html>
